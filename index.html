<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>タイル検品</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;700&display=swap');

:root {
  --bg: #f5f2ee;
  --surface: #ffffff;
  --border: #e0d8cf;
  --accent: #c8421a;
  --accent2: #2d6a4f;
  --text: #1a1510;
  --text-dim: #8a7d70;
  --ok: #2d6a4f;
  --ng: #c8421a;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100svh;
  overflow-x: hidden;
}

/* ── Setup screen ── */
#setupScreen {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  padding: 48px 24px 40px;
}

.app-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.app-name {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 32px;
}
.app-name span { color: var(--accent); }

.setup-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
}
.card-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.field-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.field-row:last-child { margin-bottom: 0; }
.field-label { font-size: 14px; }
.field-right { display: flex; align-items: center; gap: 6px; }
.field-input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 15px;
  padding: 8px 10px;
  width: 80px;
  text-align: right;
  -webkit-appearance: none;
}
.field-input:focus { outline: none; border-color: var(--accent); }
.field-unit { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

.api-input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 12px;
  width: 100%;
  -webkit-appearance: none;
}
.api-input:focus { outline: none; border-color: var(--accent); }

.btn-start {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  padding: 18px;
  margin-top: 8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn-start:active { opacity: 0.8; }

/* ── Camera screen ── */
#cameraScreen {
  display: none;
  flex-direction: column;
  height: 100svh;
  background: #000;
}

#videoEl {
  width: 100%;
  flex: 1;
  object-fit: cover;
  display: block;
}

/* Viewfinder overlay */
.viewfinder {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}
.vf-corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: white;
  border-style: solid;
  opacity: 0.7;
}
.vf-tl { top: 20%; left: 10%; border-width: 2px 0 0 2px; }
.vf-tr { top: 20%; right: 10%; border-width: 2px 2px 0 0; }
.vf-bl { bottom: 28%; left: 10%; border-width: 0 0 2px 2px; }
.vf-br { bottom: 28%; right: 10%; border-width: 0 2px 2px 0; }

.vf-hint {
  position: absolute;
  bottom: 30%;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  white-space: nowrap;
}

/* Camera bottom bar */
.cam-bar {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 20px 24px;
  padding-bottom: calc(20px + var(--safe-bottom));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-shrink: 0;
}

.cam-stats {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}
.cam-stats b { color: white; }

.shutter-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: white;
  border: 4px solid rgba(255,255,255,0.3);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: transform 0.1s;
}
.shutter-btn:active { transform: scale(0.92); }
.shutter-btn::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: white;
}
.shutter-btn.analyzing {
  background: var(--accent);
  animation: pulse-shutter 0.8s ease-in-out infinite;
}
@keyframes pulse-shutter {
  0%,100% { transform: scale(1); }
  50% { transform: scale(0.95); }
}

.btn-settings {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px 14px;
  cursor: pointer;
  letter-spacing: 0.08em;
}

/* Canvas hidden */
#captureCanvas { display: none; }

/* ── Result overlay ── */
#resultOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 24px 16px;
  padding-bottom: calc(24px + var(--safe-bottom));
  overflow-y: auto;
  align-items: flex-end;
}

.result-sheet {
  background: var(--surface);
  border-radius: 20px 20px 16px 16px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  overflow: hidden;
}

.result-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.verdict-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.icon-ok { background: rgba(45,106,79,0.12); }
.icon-ng { background: rgba(200,66,26,0.12); }
.verdict-text { flex: 1; }
.verdict-main {
  font-size: 22px; font-weight: 700;
  line-height: 1.1;
}
.verdict-main.ok { color: var(--ok); }
.verdict-main.ng { color: var(--ng); }
.verdict-score {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 3px;
}

.result-divider { height: 1px; background: var(--border); margin: 0 20px; }

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  margin: 0;
}
.result-cell {
  background: var(--surface);
  padding: 14px 16px;
}
.cell-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.cell-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  line-height: 1;
}
.cell-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.val-ok { color: var(--ok); }
.val-ng { color: var(--ng); }

.result-section {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.defect-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 8px;
}
.defect-item:last-child { margin-bottom: 0; }
.defect-sev {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sev-high { background: var(--ng); }
.sev-medium { background: #e07b00; }
.sev-low { background: #999; }
.defect-name { font-size: 13px; font-weight: 700; flex: 1; }
.defect-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

.no-defect {
  text-align: center;
  padding: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ok);
}

.reason-text {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-dim);
  background: var(--bg);
  border-radius: 8px;
  padding: 12px 14px;
}

.result-actions {
  padding: 16px 20px;
  padding-bottom: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.btn-next {
  flex: 1;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.08em;
  padding: 15px;
  cursor: pointer;
  text-transform: uppercase;
}
.btn-next:active { opacity: 0.85; }

/* Analyzing indicator */
#analyzingBanner {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: var(--accent);
  color: white;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-align: center;
  padding: 12px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
}
.dot-anim::after {
  content: '...';
  animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0%,20% { content: '.'; }
  40% { content: '..'; }
  60%,100% { content: '...'; }
}
</style>
</head>
<body>

<!-- ① Setup Screen -->
<div id="setupScreen">
  <div class="app-title">DANTO QC-VISION</div>
  <div class="app-name">タイル<br><span>検品システム</span></div>

  <div class="setup-card">
    <div class="card-label">APIキー</div>
    <input class="api-input" id="apiKey" type="password"
           placeholder="sk-ant-..." autocomplete="off" autocorrect="off">
  </div>

  <div class="setup-card">
    <div class="card-label">タイル規格</div>
    <div class="field-row">
      <span class="field-label">規定幅</span>
      <div class="field-right">
        <input class="field-input" id="targetW" type="number" value="300" inputmode="numeric">
        <span class="field-unit">mm</span>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">規定高さ</span>
      <div class="field-right">
        <input class="field-input" id="targetH" type="number" value="300" inputmode="numeric">
        <span class="field-unit">mm</span>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">許容誤差</span>
      <div class="field-right">
        <input class="field-input" id="tolerance" type="number" value="2" step="0.5" inputmode="decimal">
        <span class="field-unit">%</span>
      </div>
    </div>
  </div>

  <button class="btn-start" onclick="startCamera()">▶ 検品を開始する</button>
</div>

<!-- ② Camera Screen -->
<div id="cameraScreen">
  <div style="position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column">
    <video id="videoEl" autoplay playsinline muted style="flex:1;object-fit:cover"></video>
    <div class="viewfinder">
      <div class="vf-corner vf-tl"></div>
      <div class="vf-corner vf-tr"></div>
      <div class="vf-corner vf-bl"></div>
      <div class="vf-corner vf-br"></div>
      <div class="vf-hint">タイルをフレーム内に収めてください</div>
    </div>
  </div>
  <div class="cam-bar">
    <div class="cam-stats">
      合計 <b id="statTotal">0</b><br>
      合格 <b id="statOk" style="color:#4ade80">0</b> /
      不合格 <b id="statNg" style="color:#f87171">0</b>
    </div>
    <button class="shutter-btn" id="shutterBtn" onclick="capture()"></button>
    <button class="btn-settings" onclick="backToSetup()">設定</button>
  </div>
</div>

<!-- ③ Result Overlay -->
<div id="resultOverlay" onclick="closeResult(event)">
  <div class="result-sheet" id="resultSheet" onclick="event.stopPropagation()">
    <div class="result-header">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-text">
        <div class="verdict-main" id="verdictMain"></div>
        <div class="verdict-score" id="verdictScore"></div>
      </div>
    </div>

    <div class="result-divider"></div>

    <div class="result-grid">
      <div class="result-cell">
        <div class="cell-label">WIDTH</div>
        <div class="cell-val" id="resW">—</div>
        <div class="cell-sub" id="resWd">—</div>
      </div>
      <div class="result-cell">
        <div class="cell-label">HEIGHT</div>
        <div class="cell-val" id="resH">—</div>
        <div class="cell-sub" id="resHd">—</div>
      </div>
      <div class="result-cell">
        <div class="cell-label">SURFACE</div>
        <div class="cell-val" id="resSurface" style="font-size:15px">—</div>
      </div>
      <div class="result-cell">
        <div class="cell-label">COLOR</div>
        <div class="cell-val" id="resColor" style="font-size:15px">—</div>
      </div>
    </div>

    <div class="result-section" id="defectSection">
      <div class="section-title">検知された欠陥</div>
      <div id="defectList"></div>
    </div>

    <div class="result-section">
      <div class="section-title">判定理由</div>
      <div class="reason-text" id="reasonText"></div>
    </div>

    <div class="result-actions">
      <button class="btn-next" onclick="closeResult()">次のタイルへ →</button>
    </div>
  </div>
</div>

<!-- Analyzing banner -->
<div id="analyzingBanner">AI解析中<span class="dot-anim"></span></div>

<canvas id="captureCanvas"></canvas>

<script>
let stream = null;
let stats = { total: 0, ok: 0, ng: 0 };
let analyzing = false;

// ── Setup → Camera ──
async function startCamera() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !key.startsWith('sk-')) {
    alert('有効なAPIキーを入力してください（sk-ant-...）');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    document.getElementById('videoEl').srcObject = stream;
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('cameraScreen').style.display = 'flex';
    document.getElementById('cameraScreen').style.flexDirection = 'column';
  } catch(e) {
    alert('カメラを起動できません。\nSafariの設定でカメラを許可してください。\n\n' + e.message);
  }
}

function backToSetup() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('cameraScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
}

// ── Capture & Inspect ──
async function capture() {
  if (analyzing) return;
  analyzing = true;

  const btn = document.getElementById('shutterBtn');
  btn.classList.add('analyzing');
  document.getElementById('analyzingBanner').style.display = 'block';

  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('captureCanvas');
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const b64 = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];

  try {
    const result = await callClaude(b64);
    showResult(result);
  } catch(e) {
    alert('解析エラー: ' + e.message);
  } finally {
    btn.classList.remove('analyzing');
    document.getElementById('analyzingBanner').style.display = 'none';
    analyzing = false;
  }
}

// ── Claude API ──
async function callClaude(b64) {
  const key  = document.getElementById('apiKey').value.trim();
  const tw   = parseInt(document.getElementById('targetW').value) || 300;
  const th   = parseInt(document.getElementById('targetH').value) || 300;
  const tol  = parseFloat(document.getElementById('tolerance').value) || 2;

  const prompt = `タイル品質検査AIとして画像を分析してください。

規格: ${tw}mm × ${th}mm  許容誤差±${tol}%

JSONのみで回答（```不要）:
{
  "verdict": "OK",
  "overallScore": 95,
  "verdictReason": "判定理由",
  "sizeEstimate": {
    "widthMM": ${tw},
    "heightMM": ${th},
    "withinTolerance": true
  },
  "defects": [
    {"type": "種別", "severity": "low|medium|high", "location": "位置", "confidence": 0.9}
  ],
  "surfaceCondition": "良好",
  "colorUniformity": "良好"
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 800,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const text = data.content.map(c => c.text || '').join('').replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

// ── Show Result ──
function showResult(r) {
  const tw   = parseInt(document.getElementById('targetW').value) || 300;
  const th   = parseInt(document.getElementById('targetH').value) || 300;
  const isOk = r.verdict === 'OK';
  const size = r.sizeEstimate || {};
  const defects = r.defects || [];

  // Stats
  stats.total++;
  if (isOk) stats.ok++; else stats.ng++;
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statOk').textContent = stats.ok;
  document.getElementById('statNg').textContent = stats.ng;

  // Header
  document.getElementById('verdictIcon').className = 'verdict-icon ' + (isOk ? 'icon-ok' : 'icon-ng');
  document.getElementById('verdictIcon').textContent = isOk ? '✓' : '✗';
  document.getElementById('verdictMain').textContent = isOk ? '合格' : '不合格';
  document.getElementById('verdictMain').className = 'verdict-main ' + (isOk ? 'ok' : 'ng');
  document.getElementById('verdictScore').textContent = `スコア ${r.overallScore ?? '—'} / 100`;

  // Size
  const w = size.widthMM ?? tw;
  const h = size.heightMM ?? th;
  const dw = ((w - tw) / tw * 100).toFixed(1);
  const dh = ((h - th) / th * 100).toFixed(1);
  const sOk = size.withinTolerance !== false;
  document.getElementById('resW').textContent = w + 'mm';
  document.getElementById('resW').className = 'cell-val ' + (sOk ? 'val-ok' : 'val-ng');
  document.getElementById('resWd').textContent = (dw >= 0 ? '+' : '') + dw + '%';
  document.getElementById('resH').textContent = h + 'mm';
  document.getElementById('resH').className = 'cell-val ' + (sOk ? 'val-ok' : 'val-ng');
  document.getElementById('resHd').textContent = (dh >= 0 ? '+' : '') + dh + '%';
  document.getElementById('resSurface').textContent = r.surfaceCondition ?? '—';
  document.getElementById('resColor').textContent = r.colorUniformity ?? '—';

  // Defects
  const sevLabel = { high: '重大', medium: '中程度', low: '軽微' };
  const dl = document.getElementById('defectList');
  if (defects.length === 0) {
    dl.innerHTML = '<div class="no-defect">✓ 異常なし</div>';
  } else {
    dl.innerHTML = defects.map(d => `
      <div class="defect-item">
        <div class="defect-sev sev-${d.severity || 'low'}"></div>
        <div class="defect-name">${d.type || '不明'}</div>
        <div class="defect-meta">${d.location || ''}<br>${sevLabel[d.severity] || ''} ${Math.round((d.confidence||0.8)*100)}%</div>
      </div>`).join('');
  }

  document.getElementById('reasonText').textContent = r.verdictReason || '';

  // Show overlay
  const overlay = document.getElementById('resultOverlay');
  overlay.style.display = 'flex';
  setTimeout(() => overlay.scrollTop = overlay.scrollHeight, 50);
}

function closeResult(e) {
  if (e && e.target !== document.getElementById('resultOverlay')) return;
  document.getElementById('resultOverlay').style.display = 'none';
}
</script>
</body>
</html>
